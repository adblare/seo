<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; }
    p  { font-size: 1.125rem; color: #6b7280; max-width: 480px; text-align: center; }
    .contact {
      margin-top: 3rem;
      text-align: center;
    }
    .contact h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .contact a { color: #2563eb; text-decoration: none; }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Welcome to Our SEO Project</h1>
  <p>This site is optimized to help your business rank higher in search results, attract more qualified visitors, and turn traffic into real growth.</p>

  <section class="contact">
    <h2>Get in Touch</h2>
    <p>Ready to grow your search presence? <a href="mailto:hello@example.com">hello@example.com</a></p>
  </section>
</body>
</html>
